# Cloudflare Pages — Astro hybrid: marketing prerendered, /resources/* live SSR.
# https://developers.cloudflare.com/pages/configuration/build-configuration/
#
# Connect this repo in Cloudflare Dashboard → Workers & Pages → Create → Pages → Connect to Git.
# Build command: npm run build | Output: dist | Root: website-brisbaneservers.com
#
# Required env (production): PUBLIC_API_BASE_URL, PUBLIC_RESOURCES_LIVE=1
# Build/prerender: PAGES_BUILD_EXPORT_ON_BUILD=1, PAGES_BUILD_USE_GIT_CORPUS=1 (also set in Pages dashboard)

name = "brisbane-servers"
pages_build_output_dir = "dist"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSION"
id = "ae14cdf70dba4a4cb4ff718b15ebf826"

[vars]
PUBLIC_SITE_URL = "https://brisbaneservers.com"
PUBLIC_SITE_BASE = "/"
PUBLIC_API_BASE_URL = "https://api.brisbaneservers.com/api"
INTERNAL_API_BASE_URL = "https://api.brisbaneservers.com/api"
PUBLIC_RESOURCES_LIVE = "1"
PAGES_BUILD_USE_GIT_CORPUS = "1"
PAGES_BUILD_EXPORT_ON_BUILD = "1"
