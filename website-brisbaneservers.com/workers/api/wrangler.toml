name = "brisbane-servers-api-edge"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "92d738484386c6b613628bbeafebe2f9"
workers_dev = true

# Route api.brisbaneservers.com/* → this worker is managed in Cloudflare (not wrangler.toml).
# Wrangler route sync needs Zone Workers Routes Edit on the API token; omitting avoids deploy noise.
# Verified live: pattern api.brisbaneservers.com/* → brisbane-servers-api-edge

[vars]
PUBLIC_SITE_URL = "https://brisbaneservers.com"
AUTH_EMAIL_REPLY_TO = "connect@brisbaneservers.com"
INFERENCE_PROVIDER = "nvidia"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
NVIDIA_MODEL = "stepfun-ai/step-3.7-flash"
NVIDIA_VISION_MODEL = "moonshotai/kimi-k2.6"

[ai]
binding = "AI"

# Library growth: checks due cycles every 6h (requires schedule armed in /account admin).
[triggers]
crons = ["0 */6 * * *"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "10f7ed61ff194130946a299a4aaf38e1"

# Secrets (wrangler secret put): RESEND_API_KEY, JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD
# Optional: GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, CRON_SECRET, AUTH_EMAIL_FROM, NVIDIA_API_KEY

[alias]
"@voice-framework" = "../../../voice-framework"
"~" = "../../src"
