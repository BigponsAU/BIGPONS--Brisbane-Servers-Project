# @deprecated Render blueprint — NOT used for production (2026-06-11+).
# Live API: Cloudflare Worker brisbane-servers-api-edge at api.brisbaneservers.com
# See docs/operations/HOSTING_MCP_WORKSPACE.md and docs/operations/RENDER_MCP.md
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: brisbane-servers-api
    runtime: node
    rootDir: website-brisbaneservers.com
    buildCommand: npm ci
    startCommand: npm run start:api
    healthCheckPath: /api/test
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: MONOREPO_ROOT
        value: /opt/render/project/src
      - key: PUBLIC_SITE_URL
        value: https://brisbaneservers.com
      - key: ALLOWED_ORIGINS
        value: https://brisbaneservers.com
      - key: ALLOW_CLOUDFLARE_PAGES
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      # Use Neon (recommended, free long-term) — set in Render dashboard; do not use Render free Postgres (30-day expiry).
      - key: DATABASE_URL
        sync: false
      - key: CLOUDFLARE_PAGES_DEPLOY_HOOK_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: AUTH_EMAIL_FROM
        value: Brisbane Servers <support@brisbaneservers.com>
      - key: AUTH_EMAIL_REPLY_TO
        value: connect@brisbaneservers.com
      - key: ADMIN_EMAIL
        value: bigpons@brisbaneservers.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false

  # Optional legacy voice-framework dashboard (port 3001) — not used by brisbaneservers.com Pages site
  - type: web
    name: voice-framework-dashboard
    runtime: docker
    dockerfilePath: ./voice-framework/Dockerfile
    dockerContext: ./voice-framework
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOW_CLOUDFLARE_PAGES
        value: "1"
      - key: JWT_SECRET
        generateValue: true

# Postgres: Neon only — see docs/operations/NEON_DATABASE.md (no Render Postgres in blueprint).
