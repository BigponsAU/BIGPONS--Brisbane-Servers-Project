# Render Blueprint — Brisbane Servers hybrid production
# https://render.com/docs/blueprint-spec
#
# LIVE (2026-05-26, workspace My Workspace via Render MCP):
#   - brisbane-servers-api  → https://brisbane-servers-api.onrender.com
#   - brisbane-servers-db   → Postgres (link to API for DATABASE_URL)
# Static frontend: Cloudflare Pages project "brisbaneservers" (MCP cloudflare-api).
# Map: docs/operations/HOSTING_MCP_WORKSPACE.md
#
# Remaining operator steps:
# 1. ~~Link Postgres → brisbane-servers-api~~ DATABASE_URL set on API.
# 2. Set sync:false env: SMTP_*, CLOUDFLARE_PAGES_DEPLOY_HOOK_URL.
# 3. Confirm disk voice-storage mounted (below).
# 4. Cloudflare Pages env: PUBLIC_API_BASE_URL=https://brisbane-servers-api.onrender.com/api
#    (or https://api.brisbaneservers.com/api when api DNS is stable, DNS-only).

services:
  - type: web
    name: brisbane-servers-api
    runtime: node
    rootDir: website-brisbaneservers.com
    buildCommand: npm ci
    startCommand: npm run start:api
    healthCheckPath: /api/health
    plan: starter
    disk:
      name: voice-storage
      mountPath: /opt/render/project/src/voice-framework/storage
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: MONOREPO_ROOT
        value: /opt/render/project/src
      - key: PUBLIC_SITE_URL
        value: https://brisbaneservers.com
      - key: ALLOWED_ORIGINS
        value: https://brisbaneservers.com
      - key: ALLOW_CLOUDFLARE_PAGES
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: brisbane-servers-db
          property: connectionString
      - key: CLOUDFLARE_PAGES_DEPLOY_HOOK_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: AUTH_EMAIL_FROM
        value: Brisbane Servers <support@brisbaneservers.com>
      - key: AUTH_EMAIL_REPLY_TO
        value: connect@brisbaneservers.com
      - key: ADMIN_EMAIL
        value: bigpons@brisbaneservers.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # Optional legacy voice-framework dashboard (port 3001) — not used by brisbaneservers.com Pages site
  - type: web
    name: voice-framework-dashboard
    runtime: docker
    dockerfilePath: ./voice-framework/Dockerfile
    dockerContext: ./voice-framework
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOW_CLOUDFLARE_PAGES
        value: "1"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: brisbane-servers-db
    databaseName: brisbane_servers
    user: brisbane_servers
    plan: free
