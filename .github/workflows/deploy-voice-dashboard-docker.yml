# Build and publish the voice-framework dashboard image to GHCR.
# Deploy that image on Render, Fly, etc., then point GitHub Actions variable
# PUBLIC_API_BASE_URL at https://<your-host>/api for the Pages site build.
name: Publish Voice Dashboard (Docker / GHCR)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'voice-framework/**'
      - '.github/workflows/deploy-voice-dashboard-docker.yml'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: voice-framework/package-lock.json

      - name: Install dependencies
        working-directory: voice-framework
        run: npm ci

      - name: Run tests
        working-directory: voice-framework
        run: npm test

      - name: Build TypeScript
        working-directory: voice-framework
        run: npm run build

      - name: Audit production dependencies (high severity)
        working-directory: voice-framework
        run: npm audit --omit=dev --audit-level=high

      - name: Image name (lowercase for GHCR)
        id: image
        run: |
          owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner_lower}/voice-framework-dashboard" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./voice-framework
          file: ./voice-framework/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
