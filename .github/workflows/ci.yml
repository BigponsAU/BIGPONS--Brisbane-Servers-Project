name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website-brisbaneservers.com/package-lock.json

      - name: Install dependencies
        working-directory: website-brisbaneservers.com
        run: npm ci

      - name: Preflight (typecheck, tests, build, post-build verify)
        working-directory: website-brisbaneservers.com
        env:
          PUBLIC_API_BASE_URL: https://api.example.com/api
          INTERNAL_API_BASE_URL: https://api.example.com/api
          PUBLIC_SITE_URL: https://example.com
          PUBLIC_SITE_BASE: /
          SKIP_HOSTED_API_CHECK: 1
        run: npm run preflight:production

      - name: Audit production dependencies (high severity)
        working-directory: website-brisbaneservers.com
        run: npm audit --omit=dev --audit-level=high

  dashboard-api-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: website
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website-brisbaneservers.com/package-lock.json

      - name: Install dependencies
        working-directory: website-brisbaneservers.com
        run: npm ci

      - name: Probe live dashboard API routes
        working-directory: website-brisbaneservers.com
        run: npm run verify:dashboard-api -- --api https://api.brisbaneservers.com

  voice-framework:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: voice-framework/package-lock.json

      - name: Install dependencies
        working-directory: voice-framework
        run: npm ci

      - name: Run tests
        working-directory: voice-framework
        run: npm test

      - name: Build voice framework
        working-directory: voice-framework
        run: npm run build

      - name: Audit production dependencies (high severity)
        working-directory: voice-framework
        run: npm audit --omit=dev --audit-level=high
