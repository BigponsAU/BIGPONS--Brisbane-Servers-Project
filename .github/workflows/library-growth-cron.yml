# Optional: daily library growth due-cycle on production API (Phase 5).
# Requires: schedule armed in account workspace + CRON_SECRET on API host.
#
# Repository secrets:
#   API_BASE_URL — e.g. https://api.brisbaneservers.com or https://brisbane-servers-api.onrender.com
#   CRON_SECRET  — same value as API host CRON_SECRET

name: Library growth cron

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  growth-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Run due library growth cycle
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set API_BASE_URL and CRON_SECRET repository secrets."
            exit 0
          fi
          url="${API_BASE_URL%/}/api/cron/library-growth"
          echo "POST $url"
          code=$(curl -sS -o /tmp/growth.json -w "%{http_code}" -X POST "$url" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          cat /tmp/growth.json
          echo ""
          echo "HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            exit 1
          fi
