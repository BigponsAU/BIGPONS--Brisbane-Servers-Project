# Static site only. Pair with a hosted voice dashboard API; see DEPLOYMENT.md and repository
# variables PUBLIC_API_BASE_URL / INTERNAL_API_BASE_URL.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website-brisbaneservers.com/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: website-brisbaneservers.com
        run: npm ci

      - name: Run website tests
        working-directory: website-brisbaneservers.com
        run: npm test

      - name: Run website typecheck
        working-directory: website-brisbaneservers.com
        run: npm run typecheck

      - name: Audit production dependencies (high severity)
        working-directory: website-brisbaneservers.com
        run: npm audit --omit=dev --audit-level=high

      - name: Build static frontend
        working-directory: website-brisbaneservers.com
        env:
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
          INTERNAL_API_BASE_URL: ${{ vars.INTERNAL_API_BASE_URL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_SITE_BASE: ${{ vars.PUBLIC_SITE_BASE }}
          SKIP_HOSTED_API_CHECK: ${{ vars.SKIP_HOSTED_API_CHECK }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          # Project site lives at https://<owner>.github.io/<repo>/ — base + site origin must match.
          export PUBLIC_SITE_BASE="${PUBLIC_SITE_BASE:-/$repo_name/}"
          default_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          export PUBLIC_SITE_URL="${PUBLIC_SITE_URL:-$default_site_url}"
          export INTERNAL_API_BASE_URL="${INTERNAL_API_BASE_URL:-$PUBLIC_API_BASE_URL}"
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website-brisbaneservers.com/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
