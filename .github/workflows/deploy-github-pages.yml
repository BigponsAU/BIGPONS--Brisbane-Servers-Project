name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website-brisbaneservers.com/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: website-brisbaneservers.com
        run: npm ci

      - name: Build static frontend
        working-directory: website-brisbaneservers.com
        env:
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
          INTERNAL_API_BASE_URL: ${{ vars.INTERNAL_API_BASE_URL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_SITE_BASE: ${{ vars.PUBLIC_SITE_BASE }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          export PUBLIC_SITE_BASE="${PUBLIC_SITE_BASE:-/$repo_name/}"
          export PUBLIC_SITE_URL="${PUBLIC_SITE_URL:-https://${GITHUB_REPOSITORY_OWNER}.github.io}"
          export INTERNAL_API_BASE_URL="${INTERNAL_API_BASE_URL:-$PUBLIC_API_BASE_URL}"
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website-brisbaneservers.com/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
